<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Reveal Studio v1.5 WebGL</title>

<style>

html,body{
margin:0;
background:#0b0b0b;
color:white;
font-family:sans-serif;
overflow:hidden;
}

#app{
display:flex;
flex-direction:column;
height:100vh;
}

#toolbar{
height:60px;
background:#111;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #333;
}

button,input{
background:#1c1c1c;
border:none;
color:white;
padding:6px 10px;
border-radius:5px;
}

#viewer{
position:relative;
flex:1;
overflow:hidden;
touch-action:none;
}

canvas{
position:absolute;
top:0;
left:0;
}

#selection{
position:absolute;
border:2px dashed white;
touch-action:none;
}

.handle{
width:14px;
height:14px;
background:white;
border-radius:50%;
position:absolute;
}

.tl{top:-7px;left:-7px}
.tr{top:-7px;right:-7px}
.bl{bottom:-7px;left:-7px}
.br{bottom:-7px;right:-7px}

</style>
</head>

<body>

<div id="app">

<div id="toolbar">

<button id="windowMode">Window Reveal</button>
<button id="brushMode">Brush Reveal</button>

<label>Brush</label>
<input id="brushSize" type="range" min="10" max="200" value="60">

</div>

<div id="viewer">

<canvas id="glcanvas"></canvas>

<div id="selection" style="width:200px;height:200px;left:100px;top:100px;">

<div class="handle tl"></div>
<div class="handle tr"></div>
<div class="handle bl"></div>
<div class="handle br"></div>

</div>

</div>

</div>

<script>

/* =========================
WEBGL SETUP
========================= */

const canvas=document.getElementById("glcanvas")
const gl=canvas.getContext("webgl")

let width,height

function resize(){

width=canvas.clientWidth
height=canvas.clientHeight

canvas.width=width
canvas.height=height

gl.viewport(0,0,width,height)

}

window.addEventListener("resize",resize)
resize()

/* =========================
SHADERS
========================= */

const vertexSrc=`
attribute vec2 position;
varying vec2 uv;
void main(){
uv=(position+1.0)/2.0;
gl_Position=vec4(position,0,1);
}
`

const fragmentSrc=`

precision mediump float;

uniform sampler2D overlay;
uniform sampler2D background;

uniform vec4 windowRect;

varying vec2 uv;

void main(){

vec4 top=texture2D(overlay,uv);
vec4 bottom=texture2D(background,uv);

bool inside=
uv.x>windowRect.x &&
uv.x<windowRect.z &&
uv.y>windowRect.y &&
uv.y<windowRect.w;

gl_FragColor=inside?bottom:top;

}
`

function compile(type,src){

const s=gl.createShader(type)
gl.shaderSource(s,src)
gl.compileShader(s)
return s

}

const program=gl.createProgram()

gl.attachShader(program,compile(gl.VERTEX_SHADER,vertexSrc))
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,fragmentSrc))

gl.linkProgram(program)
gl.useProgram(program)

/* =========================
GEOMETRY
========================= */

const buffer=gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER,buffer)

gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,
1,-1,
-1,1,
1,1
]),gl.STATIC_DRAW)

const position=gl.getAttribLocation(program,"position")
gl.enableVertexAttribArray(position)
gl.vertexAttribPointer(position,2,gl.FLOAT,false,0,0)

/* =========================
TEXTURE LOADING
========================= */

function loadTexture(url){

const tex=gl.createTexture()

const img=new Image()
img.crossOrigin="anonymous"

img.onload=()=>{

gl.bindTexture(gl.TEXTURE_2D,tex)

gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE)

gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)

gl.texImage2D(
gl.TEXTURE_2D,
0,
gl.RGBA,
gl.RGBA,
gl.UNSIGNED_BYTE,
img
)

draw()

}

img.src=url

return tex

}

const overlayTex=loadTexture("overlay.png")
const backgroundTex=loadTexture("background.jpg")

gl.uniform1i(gl.getUniformLocation(program,"overlay"),0)
gl.uniform1i(gl.getUniformLocation(program,"background"),1)

const rectUniform=gl.getUniformLocation(program,"windowRect")

/* =========================
DRAW
========================= */

function draw(){

gl.activeTexture(gl.TEXTURE0)
gl.bindTexture(gl.TEXTURE_2D,overlayTex)

gl.activeTexture(gl.TEXTURE1)
gl.bindTexture(gl.TEXTURE_2D,backgroundTex)

gl.drawArrays(gl.TRIANGLE_STRIP,0,4)

}

/* =========================
WINDOW REVEAL
========================= */

const selection=document.getElementById("selection")

function updateRect(){

const r=selection.getBoundingClientRect()
const p=canvas.getBoundingClientRect()

const x1=(r.left-p.left)/width
const y1=1-(r.bottom-p.top)/height

const x2=(r.right-p.left)/width
const y2=1-(r.top-p.top)/height

gl.uniform4f(rectUniform,x1,y1,x2,y2)

draw()

}

updateRect()

/* =========================
DRAGGING
========================= */

let drag=false
let ox=0
let oy=0

selection.addEventListener("pointerdown",e=>{

if(e.target.classList.contains("handle")) return

e.preventDefault()

drag=true

ox=e.clientX-selection.offsetLeft
oy=e.clientY-selection.offsetTop

})

window.addEventListener("pointermove",e=>{

if(!drag) return

selection.style.left=(e.clientX-ox)+"px"
selection.style.top=(e.clientY-oy)+"px"

updateRect()

})

window.addEventListener("pointerup",()=>drag=false)

/* =========================
BRUSH MODE
========================= */

let mode="window"

document.getElementById("windowMode").onclick=()=>{

mode="window"
selection.style.display="block"

}

document.getElementById("brushMode").onclick=()=>{

mode="brush"
selection.style.display="none"

}

/* NOTE
Brush mode can be implemented with a reveal mask texture
and GPU blending for extremely fast scratch reveals.

Backend systems could store mask data or verify reveal
progress for NFT puzzle mechanics.

*/

</script>

</body>
</html>
