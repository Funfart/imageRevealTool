<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Reveal Tool</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

#container{
    position:relative;
    width:800px;
    max-width:95vw;
}

img{
    width:100%;
    display:block;
}

#overlay{
    position:absolute;
    top:0;
    left:0;
}

#selection{
    position:absolute;
    border:2px dashed white;
    cursor:move;
    box-sizing:border-box;
}

.handle{
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;
    position:absolute;
}

.tl{top:-7px; left:-7px; cursor:nwse-resize;}
.tr{top:-7px; right:-7px; cursor:nesw-resize;}
.bl{bottom:-7px; left:-7px; cursor:nesw-resize;}
.br{bottom:-7px; right:-7px; cursor:nwse-resize;}
</style>
</head>

<body>

<div id="container">

<img id="background" src="background.jpg">

<canvas id="overlay"></canvas>

<div id="selection" style="width:150px;height:150px;top:50px;left:50px;">
<div class="handle tl"></div>
<div class="handle tr"></div>
<div class="handle bl"></div>
<div class="handle br"></div>
</div>

</div>

<script>

const overlayCanvas = document.getElementById("overlay");
const ctx = overlayCanvas.getContext("2d");

const overlayImg = new Image();
overlayImg.src = "overlay.png";

const bg = document.getElementById("background");
const selection = document.getElementById("selection");

function resizeCanvas(){
    overlayCanvas.width = bg.clientWidth;
    overlayCanvas.height = bg.clientHeight;
    draw();
}

overlayImg.onload = resizeCanvas;
window.addEventListener("resize", resizeCanvas);

function draw(){

    ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);

    ctx.drawImage(overlayImg,0,0,overlayCanvas.width,overlayCanvas.height);

    const rect = selection.getBoundingClientRect();
    const parent = overlayCanvas.getBoundingClientRect();

    const x = rect.left - parent.left;
    const y = rect.top - parent.top;

    ctx.clearRect(x,y,selection.offsetWidth,selection.offsetHeight);
}

let dragging=false;
let offsetX=0;
let offsetY=0;

selection.addEventListener("pointerdown",(e)=>{
    if(e.target.classList.contains("handle")) return;

    dragging=true;
    offsetX=e.offsetX;
    offsetY=e.offsetY;
});

window.addEventListener("pointermove",(e)=>{
    if(!dragging) return;

    const parent = overlayCanvas.getBoundingClientRect();

    const x = e.clientX - parent.left - offsetX;
    const y = e.clientY - parent.top - offsetY;

    selection.style.left = x+"px";
    selection.style.top = y+"px";

    draw();
});

window.addEventListener("pointerup",()=>{
    dragging=false;
});


document.querySelectorAll(".handle").forEach(handle=>{

    handle.addEventListener("pointerdown",(e)=>{
        e.stopPropagation();

        const dir = handle.classList[1];

        const startX = e.clientX;
        const startY = e.clientY;

        const startWidth = selection.offsetWidth;
        const startHeight = selection.offsetHeight;
        const startLeft = selection.offsetLeft;
        const startTop = selection.offsetTop;

        function resize(ev){

            let dx = ev.clientX - startX;
            let dy = ev.clientY - startY;

            if(dir==="br"){
                selection.style.width = startWidth + dx + "px";
                selection.style.height = startHeight + dy + "px";
            }

            if(dir==="bl"){
                selection.style.width = startWidth - dx + "px";
                selection.style.left = startLeft + dx + "px";
                selection.style.height = startHeight + dy + "px";
            }

            if(dir==="tr"){
                selection.style.width = startWidth + dx + "px";
                selection.style.height = startHeight - dy + "px";
                selection.style.top = startTop + dy + "px";
            }

            if(dir==="tl"){
                selection.style.width = startWidth - dx + "px";
                selection.style.left = startLeft + dx + "px";
                selection.style.height = startHeight - dy + "px";
                selection.style.top = startTop + dy + "px";
            }

            draw();
        }

        function stop(){
            window.removeEventListener("pointermove",resize);
            window.removeEventListener("pointerup",stop);
        }

        window.addEventListener("pointermove",resize);
        window.addEventListener("pointerup",stop);

    });

});

</script>

</body>
</html>
